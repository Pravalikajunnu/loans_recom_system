version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: loans_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loans_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: loans_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/loans_db
      - SECRET_KEY=super-secret-development-key-please-change-in-production-12345
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: loans_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
